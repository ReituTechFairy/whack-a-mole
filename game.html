<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whack-a-Mole Game</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="game-window-wrap">
        <section class="card">
            <h1>Whack-a-Mole Arena</h1>

            <div class="button-row">
                <button id="startBtn" type="button">Start Game</button>
                <button id="pauseBtn" type="button">Pause / Resume</button>
                <button id="saveBtn" type="button">Save Session</button>
                <button id="loadBtn" type="button">Load Session</button>
                <button id="resetBtn" type="button">Reset Game</button>
                <button id="backBtn" onclick="window.location.href = 'index.html'" type="button">Back to Settings</button>
            </div>

            <div class="stats-grid game-stats-grid">
                <div class="stat-box">
                    <span class="label">Player</span>
                    <span id="displayPlayer">-</span>
                </div>
                <div class="stat-box">
                    <span class="label">Score</span>
                    <span id="displayScore">0</span>
                </div>
                <div class="stat-box">
                    <span class="label">Hits</span>
                    <span id="displayHits">0</span>
                </div>
                <div class="stat-box">
                    <span class="label">Misses</span>
                    <span id="displayMisses">0</span>
                </div>
                <div class="stat-box">
                    <span class="label">Time Left</span>
                    <span id="displayTimeLeft">0 s</span>
                </div>
                <div class="stat-box">
                    <span class="label">Difficulty</span>
                    <span id="displayDifficulty">-</span>
                </div>
            </div>
        </section>

        <section class="card">
            <div id="messageArea" class="message-area">Click Start Game when ready.</div>
        </section>

        <section class="card">
            <div id="boardInfo" class="board-info">
                <span><strong>Length:</strong> <span id="displayGameLength">-</span></span>
                <span><strong>Theme:</strong> <span id="displayTheme">-</span></span>
                <span><strong>Best Score Cookie:</strong> <span id="displayBestScore">0</span></span>
            </div>

            <div id="moleGrid" class="mole-grid">
                <button class="mole-hole" data-index="0"><span class="mole"></span></button>
                <button class="mole-hole" data-index="1"><span class="mole"></span></button>
                <button class="mole-hole" data-index="2"><span class="mole"></span></button>
                <button class="mole-hole" data-index="3"><span class="mole"></span></button>
                <button class="mole-hole" data-index="4"><span class="mole"></span></button>
                <button class="mole-hole" data-index="5"><span class="mole"></span></button>
                <button class="mole-hole" data-index="6"><span class="mole"></span></button>
                <button class="mole-hole" data-index="7"><span class="mole"></span></button>
                <button class="mole-hole" data-index="8"><span class="mole"></span></button>
            </div>
        </section>
    </main>

    <section class="card">
            <h2>Game Log</h2>
            <div id="logArea" class="log-area"></div>
        </section>
            <!-- Change 9 HTML — End game popup, place just before </body> -->
<div id="endGameOverlay" style="display:none;">
  <div class="end-popup">
    <h2>🎉 Game Over!</h2>
    <table class="end-table">
      <tr><td>🏆 Score</td><td id="popupScore">0</td></tr>
      <tr><td>⭐ Best Score</td><td id="popupBest">0</td></tr>
      <tr><td> Total Hits</td><td id="popupHits">0</td></tr>
      <tr><td> Total Misses</td><td id="popupMisses">0</td></tr>
    </table>
    <button id="closeEndPopup">Play Again</button>
  </div>
</div>
<!-- End Change 9 HTML -->

    <script src="game.js"></script>
</body>

</html>
